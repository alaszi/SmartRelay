name: Claude Daily Automation

on:
  schedule:
    - cron: '0 1 * * *'   # 03:00 Romania time (UTC+2/UTC+3 DST)
  workflow_dispatch:        # can also be triggered manually

jobs:

  # ─── 1. RUN TESTS (gate before any development happens) ──────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: composer test

  # ─── 2. CLAUDE DEVELOPS (only if tests are green) ─────────────────────────
  daily-improvement:
    name: Claude daily development
    runs-on: ubuntu-latest
    needs: test           # only runs after green tests!
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read CLAUDE.md — it is the primary working instruction.

            MANDATORY STEPS IN ORDER:
            1. Run: composer test
               - If any test is failing, fix that first
               - Do not continue until everything is green

            2. Peer review — check:
               - Any TODO comments in production code?
               - Any hardcoded keys or passwords?
               - Does every public method have a test?
               - Any hardcoded locality assumptions in shared code?

            3. Do today's work (per CLAUDE.md):
               - Check data source availability
               - Fix any broken parsers (with accompanying tests)
               - Generate/update alert content as needed
               - Per the Daily growth directive: look for one small,
                 well-scoped, additive enhancement (new collector, new
                 notifier, small CMMS feature, or generalizing something
                 that's currently too specific to one deployment)

            4. Before committing: run composer test again
               - Only commit if everything is green

            5. Write a summary of what was done (GitHub Actions log)

            NEVER:
            - Commit with failing tests
            - Hardcode values that should be configuration
            - Merge an interface change without a PR
            - Modify the deployment script

  # ─── 3. DEPLOY (only if both previous steps succeeded) ────────────────────
  deploy:
    name: Deploy to smartrelay.ro
    runs-on: ubuntu-latest
    needs: [test, daily-improvement]   # BOTH required!
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e   # any error stops the deploy

            cd /var/www/smartrelay.ro/SmartRelay

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Composer install ==="
            composer install --no-interaction --prefer-dist --no-dev

            echo "=== Permissions ==="
            mkdir -p logs
            chmod 755 logs

            echo "✅ Deploy complete: $(date '+%Y-%m-%d %H:%M:%S')"
