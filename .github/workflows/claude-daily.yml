name: Claude Napi Automatizálás

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  daily-improvement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Nézd át a SmartRelay projektet. Olvasd el a CLAUDE.md fájlt.
            1. Ellenőrizd van-e eltört teszt vagy hibás parser
            2. Javítsd amit tudsz önállóan (CLAUDE.md alapján)
            3. Ami emberi döntést igényel, nyiss PR-t
            4. Írj összefoglalót mit csináltál

  deploy:
    runs-on: ubuntu-latest
    needs: daily-improvement
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy smartrelay.ro-ra
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/smartrelay.ro/SmartRelay
            git pull origin main
            echo "✅ Deploy kész: $(date)"